<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Torah Jews</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

  <iframe id="siteFrame"></iframe>

  <script>
    const frame = document.getElementById("siteFrame");

    function updateView() {
      const isMobile = window.innerWidth <= 700;

      const target = isMobile
        ? "/mobile/index.html"
        : "/desktop/index.html";

      // prevent reload loop
      if (!frame.src.includes(target)) {
        frame.src = target;
      }
    }

    // run first time
    updateView();

    // auto update on resize
    window.addEventListener("resize", updateView);
  </script>

</body>
</html>
