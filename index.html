<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Torah Jews</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

  <iframe id="siteFrame"></iframe>

  <script>
    const frame = document.getElementById("siteFrame");

    if (window.innerWidth <= 700) {
      frame.src = "/mobile/index.html";
    } else {
      frame.src = "/desktop/index.html";
    }
  </script>

</body>
</html>
